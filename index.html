<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>World Flags Quiz (Offline)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      color: #38bdf8;
    }

    .flag-box {
      width: 100%;
      height: 220px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .flag-box img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    .feedback {
      text-align: center;
      font-size: 18px;
      margin-top: 10px;
    }

    .correct { color: #4ade80; }
    .wrong { color: #f87171; }
  </style>
</head>

  <div class="container">
    <h1>World Flags Quiz</h1>

    <div class="flag-box">
      <img id="flag-img" src="" alt="Flag">
    </div>

    <input id="answer" placeholder="Type the country name…" autocomplete="off">
    <button onclick="submitAnswer()">Submit</button>
    <button onclick="nextFlag()">Next Flag</button>

    <div id="feedback" class="feedback"></div>
    <div id="stats" style="text-align:center; margin-top:20px;">
      <p><strong>Correct:</strong> <span id="correct-count">0</span></p>
      <p><strong>Wrong:</strong> <span id="wrong-count">0</span></p>
    </div>

  </div> <!-- end container -->

    let correct = 0;
    let wrong = 0;
    let currentCode = null;

    function pickRandomFlag() {
      const keys = Object.keys(countries);
      const randomIndex = Math.floor(Math.random() * keys.length);
      return keys[randomIndex];
    }

    function nextFlag() {
      currentCode = pickRandomFlag();
      const img = document.getElementById("flag-img");
      img.src = "flags/" + currentCode + ".png";
      img.alt = countries[currentCode];

      document.getElementById("answer").value = "";
      document.getElementById("feedback").innerHTML = "";
    }

    function submitAnswer() {
      const userAnswer = document.getElementById("answer").value.trim().toLowerCase();
      const correctAnswer = countries[currentCode].toLowerCase();

      if (userAnswer === correctAnswer) {
        correct++;
        document.getElementById("feedback").innerHTML =
          "<span class='correct'>Correct! ✔</span>";
      } else {
        wrong++;
        document.getElementById("feedback").innerHTML =
          "<span class='wrong'>Wrong! ✘</span><br>Correct answer: " +
          countries[currentCode];
      }

      document.getElementById("correct-count").textContent = correct;
      document.getElementById("wrong-count").textContent = wrong;
    }
